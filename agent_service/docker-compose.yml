version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: graphrag_db # Agregado para un DNS predecible
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-graphrag}
      POSTGRES_USER: ${POSTGRES_USER:-graphrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-graphrag_secret}
    volumes:
      - graphrag_pg_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-graphrag} -d ${POSTGRES_DB:-graphrag}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26.23-community
    container_name: graphrag_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-graphrag_secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_db_logs_query_enabled: "VERBOSE"
      NEO4J_db_logs_query_threshold: "0"
      NEO4J_db_logs_query_parameter__logging__enabled: "true"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: graphrag_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      POSTGRES_HOST: graphrag_db # Apunta al container_name
      NEO4J_URI: bolt://graphrag_neo4j:7687 # Apunta al container_name
      # DeeplinkAgent → frontend del stack de Activos en la red compartida.
      # Override desde el host con: DEEPLINK_NAV_MAP_URL=...
      DEEPLINK_NAV_MAP_URL: ${DEEPLINK_NAV_MAP_URL:-http://activos_frontend_local:8084/__deeplink/navigation-map.json}
    volumes:
      - ./src:/app/src
      - ./atomic_tests:/app/atomic_tests
    command: ["python", "-m", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--loop", "asyncio"]

volumes:
  graphrag_pg_data:
  neo4j_data:

# TRUCO: Forzar a que la red por defecto sea la externa compartida
networks:
  default:
    name: red_global
    external: true