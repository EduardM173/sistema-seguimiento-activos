version: "3.9"

services:
  app_db_local:
    image: postgres:16-alpine
    container_name: activos_db_local
    env_file:
      - ./.env
    environment:
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_DB: $POSTGRES_DB
      PGPORT: $POSTGRES_PORT
    volumes:
      - activos_pg_data:/var/lib/postgresql/data

  backend_local:
    container_name: activos_backend_local
    image: ${DOCKER_REGISTRY:-local_activos}/backend:${TAG:-latest}
    build:
      dockerfile: dockerfile
      context: ./backend
    user: ${UID:-1000}:${GID:-1000}
    environment:
      POSTGRES_HOST: activos_db_local
      BACKEND_PORT: 3001
    depends_on:
      app_db_local:
        condition: service_started
    volumes:
      - ./backend:/app/
    command: "npm run start:dev"

  frontend_local:
    container_name: activos_frontend_local
    image: ${DOCKER_REGISTRY:-local_activos}/frontend:${TAG:-latest}
    build:
      dockerfile: dockerfile2
      context: ./frontend
    user: ${UID:-1000}:${GID:-1000}
    environment:
      VITE_API_URL: "http://localhost:8085/api"
      VITE_HOST: "localhost"
      VITE_BACKEND_URL: "http://activos_backend_local:3001"
      FRONTEND_PORT: "8084"
    ports:
      - 8085:8084
    volumes:
      - ./frontend:/app/
    depends_on:
      backend_local:
        condition: service_started

volumes:
  activos_pg_data:

# TRUCO: Forzar a que la red por defecto sea la externa compartida
networks:
  default:
    name: red_global
    external: true