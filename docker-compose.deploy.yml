services:

  app-db:
    image: postgres:16-alpine
    container_name: activos_db
    env_file:
      - ./.env

    ports:
      - $POSTGRES_PORT:$POSTGRES_PORT

    environment:
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_DB: $POSTGRES_DB
      PGPORT: $POSTGRES_PORT

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "$POSTGRES_USER", "-d", "$POSTGRES_DB", "-p", "$POSTGRES_PORT"]
      interval: 3s
      timeout: 3s
      retries: 5
  backend:
    container_name: activos_backend
    image: ${DOCKER_REGISTRY:-local_activos}/backend:${TAG:-latest}
    build:
      dockerfile: dockerfile
      context: ./backend
    user: ${UID:-1000}:${GID:-1000}
    env_file:
      - ./.env

    ports:
      - 3000:3000

    depends_on:
      app-db:
        condition: service_healthy

    command: > 
      sh -c "npx prisma migrate deploy && 
      npx prisma db seed && 
      npm run start:dev"

  frontend:
    container_name: activos_frontend
    image: ${DOCKER_REGISTRY:-local_activos}/frontend:${TAG:-latest}
    build:
      dockerfile: dockerfile2
      context: ./frontend

    user: ${UID:-1000}:${GID:-1000}
    env_file:
      - ./.env

    ports:
      - 80:8084

    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data: